name: CI

# Publishing = merge to main (Cloudflare Pages auto-deploys on merge), so this is
# the only gate between a contributor's change and the live site. It runs the same
# Astro build Cloudflare runs, plus the repo's content validators, on every PR.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- Site build (BLOCKING) ---------------------------------------------
      # The exact build Cloudflare Pages runs (project `disability-wiki`, root
      # `site/`, NODE_VERSION=22). Content is symlinked into site/src/content/docs
      # from the repo root; relative symlinks resolve on Linux runners. A failure
      # here means the merge would ship a broken deploy.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site dependencies
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build

      # BLOCKING: the offline service worker. The build RUNS gen-sw.mjs but
      # asserts nothing about its output; this executes the generated sw.js and
      # checks the two production-only failures — non-canonical precache URLs
      # (Pages 308s them) and caching a redirect-tainted response (browsers
      # refuse to serve those to a navigation). Both pass local preview.
      - name: Validate offline service worker
        working-directory: site
        run: npm run check:sw

      # BLOCKING: the native-app bundle tripwire can't rot. The iOS bundle
      # (app/ios/App/App/public) is a git-ignored copy of site/dist, so CI can't
      # verify a real archive — but it self-tests verify-bundle.mjs: that a
      # faithful sync PASSES and a tampered crisis page (numbers stripped, the
      # original P0) FAILS. If this breaks, a stale bundle could ship hotline-free
      # crisis pages with nothing to catch it. Pure Node — no cap/Xcode needed.
      - name: Native bundle tripwire self-test
        run: bash app/tools/verify-bundle.selftest.sh

      # BLOCKING: the OTA signing chain can't rot. The app's content-update
      # channel only installs manifests that verify against the pinned ed25519
      # key; this proves (with a throwaway keypair) that generate→sign→verify
      # still round-trips and that a tampered manifest is rejected. If this
      # breaks, either updates stop verifying (apps freeze on old content) or —
      # worse — the reject path fails. Pure Node — mirrors OTAUpdater.swift.
      - name: OTA signing chain self-test
        run: bash app/tools/ota-sign.selftest.sh

      # --- Content validators ------------------------------------------------
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      # BLOCKING: broken internal links. Baseline is 0; --strict exits non-zero
      # on any regression. English content only (the validator excludes es/).
      - name: Validate internal links (strict)
        run: python3 scripts/validate_wiki_links.py --strict

      # ADVISORY: content-level accessibility (alt text, headings, tables,
      # emoji-as-information). Non-blocking — the current 192 findings are all the
      # emoji-as-section-marker house style; surfaced so regressions are visible
      # without blocking merges. Promote to blocking once the emoji baseline is
      # triaged (see docs/CLAIMS.md / accessibility skill).
      - name: Accessibility check (advisory)
        run: python3 scripts/check_accessibility.py --summary
        continue-on-error: true

      # BLOCKING (regressions only): claim integrity. Fails if a claim recorded
      # as rejected in docs/CLAIMS.md reappears in published content. Verification
      # knowledge otherwise dies with the session that produced it, and the same
      # bad figure ships again the next time a source is re-imported — this is the
      # only check that carries it forward. Unledgered figures and stale ledger
      # rows are reported but do not block. See scripts/check_claims.py.
      - name: Claim integrity check
        run: python3 scripts/check_claims.py --json claim_report.json

      # BLOCKING: offline regression tests for the URL liveness probe. These
      # pin the apex-vs-www and dead-vs-unreachable logic that a live equality
      # helpline once failed. Deterministic and network-free, so unlike the
      # liveness check itself they are allowed to fail the build.
      - name: Link-checker unit tests
        run: python3 scripts/test_check_claims.py

      # ADVISORY: external organization URLs. Link rot on a crisis or resource
      # page is a real harm — an org that has gone dark is worse than no listing.
      # Network-dependent and inherently flaky (403 usually means bot-blocking,
      # not death), so it never blocks; read the log.
      - name: Organization URL liveness (advisory)
        run: python3 scripts/check_claims.py --check-urls --max-figures 0
        continue-on-error: true

  # BLOCKING, post-merge only: did this merge actually PUBLISH? The GitHub→
  # Cloudflare Pages trigger died silently on 2026-07-19 and crisis-content
  # fixes sat merged-but-unpublished for 4 days with every check green. This
  # polls the live site (up to 10 min) until it serves this commit's OTA
  # manifest — or a newer one (rapid merges supersede each other) — with a
  # valid ed25519 signature. A red X here means the live site did NOT update:
  # check the Pages Git integration, and rescue-deploy per the script's output
  # and docs/INCIDENT_RESPONSE.md.
  verify-live-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Live site serves this merge (signed)
        working-directory: site
        run: TIMEOUT_MIN=10 node tools/check-live-deploy.mjs ${{ github.sha }}
